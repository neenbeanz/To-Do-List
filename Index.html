<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="My Tasks">
<title>My Tasks</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border-med: rgba(0,0,0,0.14);
    --text: #1a1a1a;
    --text-sec: #6b6b6b;
    --text-ter: #aaaaaa;
    --red: #d94040;
    --red-bg: #fdf0f0;
    --amber: #c97a10;
    --amber-bg: #fef6e8;
    --radius: 14px;
    --radius-sm: 8px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #111111;
      --surface: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border-med: rgba(255,255,255,0.14);
      --text: #f0f0f0;
      --text-sec: #999999;
      --text-ter: #555555;
      --red-bg: #2a1a1a;
      --amber-bg: #231a0a;
    }
  }
  body { font-family: -apple-system, 'SF Pro Text', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }
  .app { max-width: 430px; margin: 0 auto; padding: 0 0 100px; }

  /* Header */
  .header { padding: env(safe-area-inset-top, 16px) 20px 12px; padding-top: calc(env(safe-area-inset-top, 0px) + 20px); display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; }
  .date-label { font-size: 13px; color: var(--text-sec); }

  /* Top bars (Deadline / Starred) */
  .top-card { margin: 0 16px 10px; background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .card-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .dot-red { background: var(--red); }
  .dot-amber { background: var(--amber); }
  .card-title { font-size: 14px; font-weight: 600; flex: 1; }
  .card-count { font-size: 12px; color: var(--text-sec); background: var(--bg); padding: 2px 8px; border-radius: 99px; }
  .chevron { font-size: 12px; color: var(--text-ter); transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* Task list */
  .task-list { border-top: 0.5px solid var(--border); }
  .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 11px 14px; border-bottom: 0.5px solid var(--border); }
  .task-item:last-child { border-bottom: none; }
  .check { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid var(--border-med); flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .check:active { transform: scale(0.9); }
  .check.done { background: var(--red); border-color: var(--red); }
  .check.done::after { content: ''; width: 6px; height: 6px; border-radius: 50%; background: white; }
  .task-body { flex: 1; min-width: 0; }
  .task-name { font-size: 14px; line-height: 1.45; }
  .task-name.done { text-decoration: line-through; color: var(--text-ter); }
  .task-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .task-acts { display: flex; align-items: center; gap: 4px; flex-shrink: 0; padding-top: 1px; }
  .act-btn { background: none; border: none; cursor: pointer; padding: 4px; color: var(--text-ter); font-size: 16px; line-height: 1; display: flex; }
  .act-btn.star-on { color: var(--amber); }
  .act-btn:active { transform: scale(0.85); }

  /* Section blocks */
  .section-card { margin: 0 16px 10px; background: var(--surface); border-radius: var(--radius); border: 0.5px solid var(--border); overflow: hidden; }
  .sec-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; cursor: pointer; user-select: none; }
  .sec-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .sec-title { font-size: 14px; font-weight: 600; flex: 1; }
  .sub-block { border-top: 0.5px solid var(--border); }
  .sub-header { display: flex; align-items: center; justify-content: space-between; padding: 7px 14px; background: var(--bg); cursor: pointer; }
  .sub-title { font-size: 11px; font-weight: 600; color: var(--text-sec); text-transform: uppercase; letter-spacing: 0.05em; }
  .empty { padding: 9px 14px; font-size: 13px; color: var(--text-ter); font-style: italic; }

  /* FAB */
  .fab { position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 24px); right: 24px; width: 56px; height: 56px; border-radius: 50%; background: var(--text); color: var(--bg); border: none; font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 100; box-shadow: 0 4px 16px rgba(0,0,0,0.18); }
  .fab:active { transform: scale(0.93); }

  /* Modal */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 200; display: flex; align-items: flex-end; }
  .sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px 20px calc(env(safe-area-inset-bottom, 0px) + 28px); width: 100%; max-height: 88dvh; overflow-y: auto; }
  .sheet-handle { width: 36px; height: 4px; background: var(--border-med); border-radius: 99px; margin: 0 auto 18px; }
  .sheet h2 { font-size: 17px; font-weight: 700; margin-bottom: 18px; }
  .field { margin-bottom: 14px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text-sec); display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .field textarea, .field select { width: 100%; font-size: 15px; padding: 10px 12px; border: 0.5px solid var(--border-med); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); font-family: inherit; appearance: none; -webkit-appearance: none; }
  .field textarea { resize: none; height: 64px; }
  .toggle-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .toggle-row { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; }
  .toggle-row input { width: 18px; height: 18px; cursor: pointer; accent-color: var(--text); flex-shrink: 0; }
  .toggle-label { font-size: 14px; }
  .toggle-sub { font-size: 12px; color: var(--text-sec); }
  .btn-row { display: flex; gap: 10px; }
  .btn { flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 15px; font-weight: 600; cursor: pointer; border: 0.5px solid var(--border-med); background: var(--bg); color: var(--text); font-family: inherit; }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn:active { opacity: 0.75; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <h1>My Tasks</h1>
    <span class="date-label" id="date-label"></span>
  </div>
  <div id="deadline-bar"></div>
  <div id="starred-bar"></div>
  <div id="sections"></div>
</div>

<button class="fab" id="fab-btn" aria-label="Add task">+</button>

<div class="overlay" id="modal" style="display:none">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>New task</h2>
    <div class="field">
      <label>Task</label>
      <textarea id="t-name" placeholder="What do you need to do?"></textarea>
    </div>
    <div class="field">
      <label>Section</label>
      <select id="t-section"></select>
    </div>
    <div class="field">
      <label>Subsection</label>
      <select id="t-sub"></select>
    </div>
    <div class="toggle-group">
      <label class="toggle-row" for="t-deadline">
        <input type="checkbox" id="t-deadline">
        <div>
          <div class="toggle-label">🔴 Deadline</div>
          <div class="toggle-sub">Must be done soon</div>
        </div>
      </label>
      <label class="toggle-row" for="t-starred">
        <input type="checkbox" id="t-starred">
        <div>
          <div class="toggle-label">⭐ Starred</div>
          <div class="toggle-sub">Important, no deadline yet</div>
        </div>
      </label>
    </div>
    <div class="btn-row">
      <button class="btn" id="cancel-btn">Cancel</button>
      <button class="btn btn-primary" id="save-btn">Add task</button>
    </div>
  </div>
</div>

<script>
const SECTIONS = [
  { id:'grind', label:'Grind', color:'#534AB7', subs:['Active','Operational','Strategic'] },
  { id:'adult', label:'Adult', color:'#0F6E56', subs:['Active','Open Inquiries','Strategic'] },
  { id:'fun',   label:'Fun',   color:'#C85A2A', subs:['Active','Operational','Discovery'] },
  { id:'admin', label:'Admin', color:'#185FA5', subs:['Active','Operational','Discovery'] },
];
const BADGE_COLORS = {
  grind: { bg:'#EEEDFE', text:'#534AB7' },
  adult: { bg:'#E1F5EE', text:'#0F6E56' },
  fun:   { bg:'#FAECE7', text:'#C85A2A' },
  admin: { bg:'#E6F1FB', text:'#185FA5' },
};

const KEY = 'mytasks_standalone_v1';
let tasks = [];
let col = {};

function load() {
  try { tasks = JSON.parse(localStorage.getItem(KEY) || '[]'); } catch(e) { tasks = []; }
  render();
}
function save() {
  try { localStorage.setItem(KEY, JSON.stringify(tasks)); } catch(e) {}
}

function render() {
  const d = new Date();
  document.getElementById('date-label').textContent = d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
  renderBar('deadline-bar','Deadline','dot-red', tasks.filter(t=>t.deadline&&!t.done),'__dl__','Nothing flagged yet');
  renderBar('starred-bar','Starred','dot-amber', tasks.filter(t=>t.starred&&!t.done),'__st__','Nothing starred yet');
  renderSections();
}

function renderBar(elId, label, dotCls, list, key, empty) {
  const open = col[key] !== false;
  document.getElementById(elId).innerHTML = `
    <div class="top-card">
      <div class="card-header" onclick="tog('${key}')">
        <div class="dot ${dotCls}"></div>
        <span class="card-title">${label}</span>
        <span class="card-count">${list.length}</span>
        <span class="chevron ${open?'open':''}">▼</span>
      </div>
      ${open?`<div class="task-list">${list.length?list.map(t=>taskHTML(t,true)).join(''):`<div class="empty">${empty}</div>`}</div>`:''}
    </div>`;
}

function taskHTML(t, inTop) {
  const bc = BADGE_COLORS[t.section];
  const sec = SECTIONS.find(s=>s.id===t.section);
  let badges = '';
  if (inTop && sec && bc) badges += `<span class="badge" style="background:${bc.bg};color:${bc.text}">${sec.label}</span>`;
  if (!inTop && t.deadline) badges += `<span class="badge badge-red">Deadline</span>`;
  return `<div class="task-item">
    <div class="check ${t.done?'done':''}" onclick="toggleDone('${t.id}')"></div>
    <div class="task-body">
      <div class="task-name ${t.done?'done':''}">${esc(t.name)}</div>
      ${badges?`<div class="task-badges">${badges}</div>`:''}
    </div>
    <div class="task-acts">
      <button class="act-btn ${t.starred?'star-on':''}" onclick="toggleStar('${t.id}')" aria-label="Star">${t.starred?'★':'☆'}</button>
      <button class="act-btn" onclick="del('${t.id}')" aria-label="Delete">✕</button>
    </div>
  </div>`;
}

function renderSections() {
  document.getElementById('sections').innerHTML = SECTIONS.map(sec=>{
    const st = tasks.filter(t=>t.section===sec.id&&!t.done);
    const open = col[sec.id]!==false;
    return `<div class="section-card">
      <div class="sec-header" onclick="tog('${sec.id}')">
        <div class="sec-dot" style="background:${sec.color}"></div>
        <span class="sec-title">${sec.label}</span>
        <span class="card-count">${st.length}</span>
        <span class="chevron ${open?'open':''}">▼</span>
      </div>
      ${open?sec.subs.map(sub=>{
        const subT = st.filter(t=>t.sub===sub);
        const sk = sec.id+'_'+sub;
        const so = col[sk]!==false;
        return `<div class="sub-block">
          <div class="sub-header" onclick="tog('${sk}')">
            <span class="sub-title">${sub}</span>
            <span class="card-count">${subT.length}</span>
          </div>
          ${so?(subT.length?`<div class="task-list">${subT.map(t=>taskHTML(t,false)).join('')}</div>`:'<div class="empty">Empty</div>'):''}
        </div>`;
      }).join(''):''}
    </div>`;
  }).join('');
}

function tog(k) { col[k]=col[k]===false?true:false; render(); }
function toggleDone(id) { const t=tasks.find(t=>t.id===id); if(t){t.done=!t.done;save();render();} }
function toggleStar(id) { const t=tasks.find(t=>t.id===id); if(t){t.starred=!t.starred;save();render();} }
function del(id) { if(confirm('Delete this task?')){tasks=tasks.filter(t=>t.id!==id);save();render();} }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

const modal = document.getElementById('modal');
const tSec = document.getElementById('t-section');
const tSub = document.getElementById('t-sub');

SECTIONS.forEach(s=>{ const o=document.createElement('option'); o.value=s.id; o.textContent=s.label; tSec.appendChild(o); });

function updateSubs() {
  const sec = SECTIONS.find(s=>s.id===tSec.value);
  tSub.innerHTML='';
  if(sec) sec.subs.forEach(sub=>{ const o=document.createElement('option'); o.value=sub; o.textContent=sub; tSub.appendChild(o); });
}
tSec.addEventListener('change',updateSubs);
updateSubs();

document.getElementById('fab-btn').onclick=()=>{
  document.getElementById('t-name').value='';
  document.getElementById('t-deadline').checked=false;
  document.getElementById('t-starred').checked=false;
  updateSubs();
  modal.style.display='flex';
  setTimeout(()=>document.getElementById('t-name').focus(),120);
};
document.getElementById('cancel-btn').onclick=()=>modal.style.display='none';
modal.addEventListener('click',e=>{ if(e.target===modal) modal.style.display='none'; });
document.getElementById('save-btn').onclick=()=>{
  const name=document.getElementById('t-name').value.trim();
  if(!name) return;
  tasks.push({ id:Date.now().toString(), name, section:tSec.value, sub:tSub.value, deadline:document.getElementById('t-deadline').checked, starred:document.getElementById('t-starred').checked, done:false });
  save(); render(); modal.style.display='none';
};

load();
</script>
</body>
</html>
